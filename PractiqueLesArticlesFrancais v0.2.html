<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maître des Articles Français - 100 Scénarios</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8fafc; color: #1e293b; display: flex; justify-content: center; padding: 20px; line-height: 1.5; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 850px; width: 100%; }
        
        h1 { color: #0f172a; text-align: center; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #64748b; font-size: 0.95em; margin-bottom: 40px; }
        .en-sub { display: block; font-size: 0.85em; color: #94a3b8; font-weight: normal; margin-top: 3px; }

        .scenario { margin-bottom: 35px; padding: 25px; border: 1px solid #e2e8f0; border-radius: 12px; background: #ffffff; transition: transform 0.2s; }
        .scenario:hover { border-color: #3498db; }
        
        .main-sentence { font-size: 1.5em; font-weight: 700; color: #2563eb; margin-bottom: 10px; display: block; text-align: center; }
        .support-text { font-size: 0.9em; color: #64748b; margin-bottom: 20px; text-align: center; display: block; border-top: 1px solid #f1f5f9; padding-top: 10px; }
        
        .options { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        input[type="text"] { padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; width: 180px; font-size: 1.1em; text-align: center; }
        input[type="text"]:focus { border-color: #3498db; outline: none; }
        
        button { padding: 12px 20px; cursor: pointer; border: 1px solid #3498db; background: white; border-radius: 8px; font-weight: 600; transition: 0.2s; color: #3498db; }
        button:hover { background: #3498db; color: white; }
        .btn-check { background: #3498db; color: white; }
        .btn-main { background: #1e293b; color: white; width: 100%; font-size: 1.2em; padding: 20px; border: none; margin-top: 20px; }
        .btn-main:hover { background: #334155; }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .correct { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .incorrect { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .explanation-fr { font-weight: 600; display: block; margin-bottom: 5px; }
        .explanation-en { font-size: 0.85em; color: #475569; font-style: italic; display: block; }

        #score-display { text-align: center; font-size: 1.5em; font-weight: 800; margin-bottom: 30px; color: #3b82f6; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <h1>Maître des Articles Français</h1>
    <div class="subtitle">Entraînement Intensif : 100 Scénarios <br> <span class="en-sub">Intensive Training: 100 Scenarios</span></div>

    <div id="score-display"></div>
    <div id="quiz-area"></div>
    
    <div id="controls">
        <button class="btn-main" onclick="startQuiz()">Nouvelle Session Aléatoire (12 questions) <br> <span class="en-sub" style="color:#cbd5e1">New Random Session (12 questions)</span></button>
    </div>
</div>

<script>
    const scenarios = [
        // PREFERENCE VERBS (Strict Definite)
        { s: "J'aime ___ fromage.", a: ["le"], t: ["Défini"], e: "Aimer est un verbe de préférence : utilisez l'article défini.", e_en: "Aimer is a preference verb: use the definite article." },
        { s: "Elle déteste ___ pluie.", a: ["la"], t: ["Défini"], e: "Détester est un verbe de préférence : utilisez l'article défini.", e_en: "Détester is a preference verb: use the definite article." },
        { s: "Nous préférons ___ vin rouge.", a: ["le"], t: ["Défini"], e: "Préférer est un verbe de préférence : utilisez l'article défini.", e_en: "Préférer is a preference verb: use the definite article." },
        { s: "Ils adorent ___ épinards.", a: ["les"], t: ["Défini"], e: "Adorer est un verbe de préférence : utilisez l'article défini (les).", e_en: "Adorer is a preference verb: use the definite article (les)." },
        { s: "Je n'aime pas ___ bière.", a: ["la"], t: ["Défini"], e: "Même à la forme négative, les verbes de préférence gardent l'article défini.", e_en: "Even in the negative form, preference verbs keep the definite article." },

        // NEGATIVES (Strict 'de/d'')
        { s: "Je ne mange pas ___ viande.", a: ["de"], t: ["Négatif"], e: "Après une négation, les articles partitifs deviennent 'de'.", e_en: "After a negation, partitive articles become 'de'." },
        { s: "Il n'y a plus ___ eau.", a: ["d'"], t: ["Négatif"], e: "Après une négation, 'de' devient 'd'' devant une voyelle.", e_en: "After a negation, 'de' becomes 'd'' before a vowel." },
        { s: "Nous n'avons jamais ___ chance.", a: ["de"], t: ["Négatif"], e: "La négation 'ne...jamais' transforme le partitif en 'de'.", e_en: "The negation 'ne...jamais' turns the partitive into 'de'." },
        { s: "Elle ne boit jamais ___ café.", a: ["de"], t: ["Négatif"], e: "Négation = 'de'.", e_en: "Negation = 'de'." },
        { s: "Je ne veux plus ___ sucre.", a: ["de"], t: ["Négatif"], e: "Négation = 'de'.", e_en: "Negation = 'de'." },

        // AMBIGUOUS FOOD (Partitive/Indefinite/Definite)
        { s: "Voulez-vous ___ thé ?", a: ["du", "le", "un"], t: ["Partitif", "Défini", "Indéfini"], e: "Du (quantité), Le (spécifique), ou Un (une tasse).", e_en: "Du (some), Le (the specific one), or Un (one cup)." },
        { s: "Je prends ___ soupe.", a: ["de la", "la"], t: ["Partitif", "Défini"], e: "De la (quantité indéfinie) ou La (la soupe qui est prête).", e_en: "De la (indefinite quantity) or La (the soup that is ready)." },
        { s: "Elle achète ___ oranges.", a: ["des", "les"], t: ["Indéfini", "Défini"], e: "Des (quelques-unes) ou Les (toutes les oranges du magasin).", e_en: "Des (some) or Les (all the specific oranges)." },
        { s: "Tu manges ___ poulet ?", a: ["du", "le", "un"], t: ["Partitif", "Défini", "Indéfini"], e: "Du (une partie), Le (le poulet entier spécifique), Un (un poulet entier).", e_en: "Du (some), Le (the specific whole chicken), Un (a whole chicken)." },
        { s: "Il y a ___ lait dans le frigo.", a: ["du", "le"], t: ["Partitif", "Défini"], e: "Du (une certaine quantité) ou Le (le lait que nous avons acheté).", e_en: "Du (some quantity) or Le (the specific milk we bought)." },

        // WEATHER & ACTIVITIES
        { s: "Il fait ___ soleil.", a: ["du"], t: ["Partitif"], e: "L'expression 'faire du soleil' utilise le partitif.", e_en: "The expression 'faire du soleil' uses the partitive." },
        { s: "Il fait ___ vent.", a: ["du"], t: ["Partitif"], e: "Expressions météo avec faire + partitif.", e_en: "Weather expressions with faire + partitive." },
        { s: "Je fais ___ tennis.", a: ["du"], t: ["Partitif"], e: "Faire + sport (masculin) = du.", e_en: "Faire + sport (masculine) = du." },
        { s: "Elle fait ___ natation.", a: ["de la"], t: ["Partitif"], e: "Faire + sport (féminin) = de la.", e_en: "Faire + sport (feminine) = de la." },
        { s: "Nous faisons ___ équitation.", a: ["de l'"], t: ["Partitif"], e: "Faire + sport (voyelle) = de l'.", e_en: "Faire + sport (vowel) = de l'." },

        // ABSTRACT QUALITIES
        { s: "Il faut ___ patience.", a: ["de la"], t: ["Partitif"], e: "Patience est un concept abstrait féminin : utilisez de la.", e_en: "Patience is a feminine abstract concept: use de la." },
        { s: "Tu as ___ talent.", a: ["du"], t: ["Partitif"], e: "Talent est masculin et abstrait : utilisez du.", e_en: "Talent is masculine and abstract: use du." },
        { s: "Elle a ___ ambition.", a: ["de l'"], t: ["Partitif"], e: "Ambition commence par une voyelle.", e_en: "Ambition starts with a vowel." },

        { s: "Ils montrent ___ courage.", a: ["du"], t: ["Partitif"], e: "Courage est masculin.", e_en: "Courage is masculine." },

        // MORE SCENARIOS (General Objects, Household, etc)
        { s: "C'est ___ livre de Marie.", a: ["le"], t: ["Défini"], e: "C'est un objet spécifique appartenant à quelqu'un.", e_en: "It's a specific object belonging to someone." },

        { s: "Donne-moi ___ sel.", a: ["le", "du"], t: ["Défini", "Partitif"], e: "Le (passe-moi la salière) ou Du (j'en ai besoin d'un peu).", e_en: "Le (pass the salt shaker) or Du (I need a bit of it)." },

        { s: "Voulez-vous ___ pain ?", a: ["du", "le"], t: ["Partitif", "Défini"], e: "Du (une portion) ou Le (le pain sur la table).", e_en: "Du (a portion) or Le (the bread on the table)." },

        { s: "Nous mangeons ___ riz.", a: ["du"], t: ["Partitif"], e: "Riz est masculin et on en mange une portion.", e_en: "Riz is masculine and eaten in portions." },
        { s: "Elle a ___ argent.", a: ["de l'"], t: ["Partitif"], e: "Argent commence par une voyelle.", e_en: "Argent starts with a vowel." },

        { s: "Tu as ___ temps ?", a: ["du"], t: ["Partitif"], e: "Temps est masculin.", e_en: "Temps is masculine." },
        { s: "Il demande ___ aide.", a: ["de l'"], t: ["Partitif"], e: "Aide commence par une voyelle.", e_en: "Aide starts with a vowel." },
        { s: "Elle préfère ___ chocolat noir.", a: ["le"], t: ["Défini"], e: "Verbe de préférence.", e_en: "Preference verb." },
        { s: "Je mets ___ beurre sur mon pain.", a: ["du"], t: ["Partitif"], e: "Beurre est masculin.", e_en: "Beurre is masculine." },
        { s: "Il n'y a pas ___ neige.", a: ["de"], t: ["Négatif"], e: "Négation = de.", e_en: "Negation = de." },
        { s: "Tu as ___ frères ?", a: ["des"], t: ["Indéfini"], e: "Pluriel dénombrable.", e_en: "Countable plural." },
        { s: "Nous écoutons ___ musique.", a: ["de la", "la"], t: ["Partitif", "Défini"], e: "De la (un peu de musique) ou La (la musique qui joue).", e_en: "De la (some music) or La (the music playing)." },
        { s: "Il achète ___ journal.", a: ["un", "le"], t: ["Indéfini", "Défini"], e: "Un (n'importe lequel) ou Le (celui de d'habitude).", e_en: "Un (any) or Le (the usual one)." },
        { s: "Elle ne mange plus ___ poisson.", a: ["de"], t: ["Négatif"], e: "Négation = de.", e_en: "Negation = de." },
        { s: "Vous voulez ___ glace ?", a: ["de la", "une"], t: ["Partitif", "Indéfini"], e: "De la (une portion) ou Une (un cornet entier).", e_en: "De la (some) or Une (a whole cone)." },
        { s: "Je déteste ___ hiver.", a: ["l'"], t: ["Défini"], e: "Saisons avec verbe de préférence.", e_en: "Seasons with preference verbs." },
        { s: "Il possède ___ talent fou.", a: ["un", "du"], t: ["Indéfini", "Partitif"], e: "Un (un talent spécifique) ou Du (du talent en général).", e_en: "Un (a specific talent) or Du (some talent)." },
        { s: "Nous buvons ___ jus de pomme.", a: ["du"], t: ["Partitif"], e: "Jus est masculin.", e_en: "Jus is masculine." },

        { s: "Nous voulons ___ liberté.", a: ["de la", "la"], t: ["Partitif", "Défini"], e: "De la (un peu de) ou La (le concept général).", e_en: "De la (some) or La (the general concept)." },
        { s: "Il dessine ___ arbres.", a: ["des", "les"], t: ["Indéfini", "Défini"], e: "Des (quelques arbres) ou Les (les arbres du jardin).", e_en: "Des (some trees) or Les (the garden trees)." },

        { s: "Je ne veux pas ___ problèmes.", a: ["de"], t: ["Négatif"], e: "Négation.", e_en: "Negation." },
        { s: "Voulez-vous ___ confiture ?", a: ["de la"], t: ["Partitif"], e: "Féminin.", e_en: "Feminine." },
        { s: "Il fait ___ brouillard.", a: ["du"], t: ["Partitif"], e: "Météo.", e_en: "Weather." },
        { s: "Elle fait ___ piano.", a: ["du"], t: ["Partitif"], e: "Instrument (masculin).", e_en: "Instrument (masculine)." },
        { s: "Nous faisons ___ gymnastique.", a: ["de la"], t: ["Partitif"], e: "Activité (féminin).", e_en: "Activity (feminine)." },
        { s: "Je prends ___ photo.", a: ["une", "la"], t: ["Indéfini", "Défini"], e: "Une (une seule) ou La (la photo dont on a parlé).", e_en: "Une (one) or La (the specific photo)." },
        { s: "Il n'y a plus ___ pain.", a: ["de"], t: ["Négatif"], e: "Négation.", e_en: "Negation." },
        { s: "Elle mange ___ céréales.", a: ["des"], t: ["Indéfini"], e: "Pluriel.", e_en: "Plural." },
        { s: "Nous buvons ___ limonade.", a: ["de la"], t: ["Partitif"], e: "Féminin.", e_en: "Feminine." },
        { s: "Il a ___ peur.", a: ["peur", "de la"], a: ["de la"], t: ["Partitif"], e: "Émotion abstraite féminine.", e_en: "Feminine abstract emotion." },
        { s: "Elle a ___ chance.", a: ["de la"], t: ["Partitif"], e: "Abstrait féminin.", e_en: "Feminine abstract." },
        { s: "Je n'ai pas ___ idée.", a: ["d'"], t: ["Négatif"], e: "Négation devant voyelle.", e_en: "Negation before vowel." },
        { s: "Vous voulez ___ salade ?", a: ["de la", "la", "une"], t: ["Partitif", "Défini", "Indéfini"], e: "De la (quantité), La (la salade préparée), Une (une salade entière).", e_en: "De la (some), La (the prepared salad), Une (a whole lettuce)." },
        { s: "Il étudie ___ histoire.", a: ["l'"], t: ["Défini"], e: "Matière scolaire (généralité).", e_en: "School subject (generality)." },

    let currentQuiz = [];
    let score = 0;
    let questionsAnswered = 0;

    function startQuiz() {
        score = 0;
        questionsAnswered = 0;
        document.getElementById('score-display').innerHTML = "Score : 0 / 12";
        const shuffled = [...scenarios].sort(() => 0.5 - Math.random());
        currentQuiz = shuffled.slice(0, 12);
        renderQuiz();
        window.scrollTo(0,0);
    }

    function renderQuiz() {
        const area = document.getElementById('quiz-area');
        area.innerHTML = '';
        
        currentQuiz.forEach((item, index) => {
            const isFillBlank = Math.random() > 0.5;
            const div = document.createElement('div');
            div.className = 'scenario';
            
            if (isFillBlank) {
                div.innerHTML = `
                    <div class="main-sentence">« ${item.s} »</div>
                    <span class="support-text">Complétez la phrase <br> <span class="en-sub">Complete the sentence</span></span>
                    <div class="options" id="opt-${index}">
                        <input type="text" id="input-${index}" placeholder="...">
                        <button class="btn-check" onclick="checkFill(${index})">Vérifier / Check</button>
                    </div>
                `;
            } else {
                const exampleArticle = item.a[0];
                const boldSentence = item.s.replace('___', `<span style="text-decoration: underline; color: #e11d48;">${exampleArticle}</span>`);
                div.innerHTML = `
                    <div class="main-sentence">« ${boldSentence} »</div>
                    <span class="support-text">Quel est le type de l'article souligné ? <br> <span class="en-sub">What is the type of the underlined article?</span></span>
                    <div class="options">
                        <button onclick="checkType(${index}, 'Partitif')">Partitif</button>
                        <button onclick="checkType(${index}, 'Défini')">Défini</button>
                        <button onclick="checkType(${index}, 'Indéfini')">Indéfini</button>
                        <button onclick="checkType(${index}, 'Négatif')">Négatif (de/d')</button>
                    </div>
                `;
            }
            
            div.innerHTML += `<div id="feedback-${index}" class="feedback"></div>`;
            area.appendChild(div);
        });
    }

    function checkFill(idx) {
        const val = document.getElementById(`input-${idx}`).value.trim().toLowerCase();
        const item = currentQuiz[idx];
        const feedback = document.getElementById(`feedback-${idx}`);
        feedback.style.display = 'block';

        if (item.a.map(ans => ans.toLowerCase()).includes(val)) {
            showResult(feedback, true, `Correct ! ${item.e}`, item.e_en);
            score++;
        } else {
            const correctList = item.a.join(' / ');
            showResult(feedback, false, `Faux. Réponse(s) possible(s) : ${correctList}. ${item.e}`, item.e_en);
        }
        finalizeQuestion(idx);
    }

    function checkType(idx, selectedType) {
        const item = currentQuiz[idx];
        const feedback = document.getElementById(`feedback-${idx}`);
        feedback.style.display = 'block';

        if (item.t.includes(selectedType)) {
            showResult(feedback, true, `Correct ! Type : ${selectedType}. ${item.e}`, item.e_en);
            score++;
        } else {
            showResult(feedback, false, `Faux. Type(s) correct(s) : ${item.t.join(' or ')}. ${item.e}`, item.e_en);
        }
        finalizeQuestion(idx);
    }

    function showResult(div, isCorrect, textFr, textEn) {
        div.className = isCorrect ? "feedback correct" : "feedback incorrect";
        div.innerHTML = `<span class="explanation-fr">${textFr}</span><span class="explanation-en">${textEn}</span>`;
    }

    function finalizeQuestion(idx) {
        questionsAnswered++;
        updateScore();
        const container = document.getElementsByClassName('scenario')[idx];
        const inputs = container.getElementsByTagName('input');
        const buttons = container.getElementsByTagName('button');
        for (let i of inputs) i.disabled = true;
        for (let b of buttons) b.disabled = true;
    }

    function updateScore() {
        document.getElementById('score-display').innerHTML = `Score : ${score} / 12`;
    }

    // Initialize the quiz on load
    window.onload = startQuiz;
</script>

</body>
