<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeu de l'Alphabet</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            user-select: none;
        }
        #game-container {
            background-color: white;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 90vw;
            max-width: 600px;
            height: 80vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        .hidden { display: none !important; }
        
        /* Buttons and Interactive Elements */
        button {
            background-color: #ff9fb5;
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 2rem;
            padding: 15px 40px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 159, 181, 0.4);
            transition: transform 0.2s;
            font-family: inherit;
        }
        button:active { transform: scale(0.95); }
        
        /* Learning Screen */
        .letters {
            font-size: 8rem;
            color: #4a4a4a;
            margin: 0;
            line-height: 1;
        }
        .emoji {
            font-size: 10rem;
            margin: 20px 0;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .emoji:active { transform: scale(1.1); }
        .controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        .nav-btn {
            background-color: #4ecdc4;
            font-size: 3rem;
            padding: 10px 30px;
        }

        /* Quiz Screen */
        .quiz-options {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .quiz-card {
            background-color: #ffe66d;
            border-radius: 20px;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .quiz-card:active { transform: scale(0.9); }
        
        #speaker-icon {
            font-size: 3rem;
            cursor: pointer;
            background: #a8e6cf;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="start-screen">
        <div class="emoji" style="font-size: 6rem;">🎈</div>
        <button onclick="startGame()">Jouer ! ▶️</button>
    </div>

    <div id="learn-screen" class="hidden">
        <h1 class="letters" id="learn-letters" onclick="playCurrentAudio()">A a</h1>
        <div class="emoji" id="learn-emoji" onclick="playCurrentAudio()">🐝</div>
        <div class="controls">
            <button class="nav-btn" onclick="prevLetter()">⬅️</button>
            <button class="nav-btn" id="next-btn" onclick="nextLetter()">➡️</button>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div id="speaker-icon" onclick="playQuizAudio()">🔊</div>
        <div class="quiz-options" id="quiz-options">
            </div>
    </div>

</div>

<script>
    // Data: French alphabet A-E (Shortened for a 3yo's attention span)
    const alphabetData = [
        { letter: 'A', word: 'Abeille', emoji: '🐝' },
        { letter: 'B', word: 'Baleine', emoji: '🐳' },
        { letter: 'C', word: 'Chat', emoji: '🐱' },
        { letter: 'D', word: 'Dauphin', emoji: '🐬' },
        { letter: 'E', word: 'Éléphant', emoji: '🐘' }
    ];

    let currentIndex = 0;
    let quizTarget = null;

    // Speech synthesis helper
    function speak(text) {
        window.speechSynthesis.cancel(); // Stop any current speech
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fr-FR'; // French
        utterance.rate = 0.85;    // Slightly slower for a child
        utterance.pitch = 1.2;    // Slightly friendlier pitch
        window.speechSynthesis.speak(utterance);
    }

    // --- Navigation & States ---
    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('learn-screen').classList.remove('hidden');
        currentIndex = 0;
        updateLearnScreen();
    }

    // --- Learn Mode ---
    function updateLearnScreen() {
        const data = alphabetData[currentIndex];
        document.getElementById('learn-letters').innerText = `${data.letter} ${data.letter.toLowerCase()}`;
        document.getElementById('learn-emoji').innerText = data.emoji;
        
        // Change next button to a star if it's the last letter, indicating quiz time
        const nextBtn = document.getElementById('next-btn');
        if (currentIndex === alphabetData.length - 1) {
            nextBtn.innerText = '⭐';
        } else {
            nextBtn.innerText = '➡️';
        }

        playCurrentAudio();
    }

    function playCurrentAudio() {
        const data = alphabetData[currentIndex];
        // Sounds out the letter, then the word. e.g., "A... Abeille"
        speak(`${data.letter}. ${data.word}`); 
    }

    function nextLetter() {
        if (currentIndex < alphabetData.length - 1) {
            currentIndex++;
            updateLearnScreen();
        } else {
            startQuiz();
        }
    }

    function prevLetter() {
        if (currentIndex > 0) {
            currentIndex--;
            updateLearnScreen();
        }
    }

    // --- Quiz Mode ---
    function startQuiz() {
        document.getElementById('learn-screen').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        generateQuiz();
    }

    function generateQuiz() {
        // Pick a random target from our data
        quizTarget = alphabetData[Math.floor(Math.random() * alphabetData.length)];
        
        // Pick 2 wrong answers
        let options = [quizTarget];
        while(options.length < 3) {
            let randomWrong = alphabetData[Math.floor(Math.random() * alphabetData.length)];
            if(!options.includes(randomWrong)) {
                options.push(randomWrong);
            }
        }
        
        // Shuffle options
        options.sort(() => Math.random() - 0.5);

        // Render options
        const optionsContainer = document.getElementById('quiz-options');
        optionsContainer.innerHTML = '';
        
        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerText = opt.emoji; // Child clicks the picture based on the audio
            card.onclick = () => checkAnswer(opt);
            optionsContainer.appendChild(card);
        });

        // Delay slighty so screen loads before speaking
        setTimeout(playQuizAudio, 500);
    }

    function playQuizAudio() {
        speak(`Où est, ${quizTarget.word} ?`); // "Where is the [word]?"
    }

    function checkAnswer(selected) {
        if (selected.letter === quizTarget.letter) {
            speak(`Bravo ! C'est ${quizTarget.word}.`);
            // Add a little celebration, then new quiz after 2 seconds
            setTimeout(generateQuiz, 2000);
        } else {
            speak(`Non, ça c'est ${selected.word}. Cherche ${quizTarget.word}.`);
        }
    }
</script>
</body>
</html>
